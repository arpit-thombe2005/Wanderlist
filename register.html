<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Wanderlist</title>
    <link rel="icon" type="image/png" href="public/logo.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: fadeInUp 0.6s ease;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header .logo {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
            line-height: 1.1;
        }
        /* Override global .logo-img sizing (it's 3em in styles.css, too big for auth pages) */
        .auth-header .logo .logo-img {
            height: 48px;
            width: auto;
        }
        .auth-header h2 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-header p {
            color: var(--text-secondary);
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-group-auth {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group-auth label {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .form-input-auth {
            padding: 1rem 1.25rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }
        .form-input-auth:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-light);
        }
        .auth-link {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-secondary);
        }
        .auth-link a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: rgba(5, 150, 105, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            display: none;
        }
        .success-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 1rem;
            }
            .auth-card {
                padding: 2rem 1.5rem;
            }
            .auth-header .logo {
                font-size: 2rem;
                flex-direction: column;
                gap: 0.5rem;
            }
            .auth-header .logo .logo-img {
                height: 44px;
            }
            .auth-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <img src="public/logo.png" alt="Wanderlist Logo" class="logo-img">
                    Wanderlist
                </div>
                <h2>Create Account</h2>
                <p>Start tracking your travel destinations</p>
            </div>
            
            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>
            
            <form class="auth-form" id="registerForm">
                <div class="form-group-auth">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input-auth" required autocomplete="username">
                </div>
                
                <div class="form-group-auth">
                    <label for="email">Email (optional)</label>
                    <input type="email" id="email" class="form-input-auth" autocomplete="email">
                </div>
                
                <div class="form-group-auth">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input-auth" required autocomplete="new-password" minlength="6">
                    <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem;">
                        Must be at least 6 characters
                    </p>
                </div>
                
                <div class="form-group-auth">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input-auth" required autocomplete="new-password" minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary" id="registerBtn">Create Account</button>
            </form>
            
            <div class="auth-link">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
